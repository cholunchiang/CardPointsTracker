<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardPointsTracker Tests 🧪</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
      max-width: 900px; 
      margin: 0 auto; 
      padding: 20px;
      background: #f5f5f7;
    }
    h1 { color: #1d1d1f; }
    .test-suite { 
      background: #fff; 
      border-radius: 12px; 
      padding: 16px; 
      margin: 16px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .test-suite h2 { 
      margin: 0 0 12px; 
      font-size: 16px; 
      color: #1d1d1f;
    }
    .test { 
      padding: 8px 12px; 
      margin: 4px 0; 
      border-radius: 8px; 
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .test.pass { background: rgba(52, 199, 89, 0.15); color: #248a3d; }
    .test.fail { background: rgba(255, 59, 48, 0.15); color: #d70015; }
    .test.pending { background: rgba(255, 204, 0, 0.15); color: #996600; }
    .summary {
      background: #1d1d1f;
      color: #fff;
      padding: 16px;
      border-radius: 12px;
      margin-top: 20px;
      font-size: 18px;
      text-align: center;
    }
    .summary.all-pass { background: #248a3d; }
    .summary.has-fail { background: #d70015; }
    button {
      background: #007AFF;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 10px 0;
    }
    button:hover { background: #0056b3; }
    #log {
      background: #1d1d1f;
      color: #98989d;
      padding: 12px;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 16px;
      display: none;
    }
    #log.visible { display: block; }
  </style>
</head>
<body>
  <h1>🧪 CardPointsTracker Test Suite</h1>
  <p>Automated tests for core functionality</p>
  <p style="font-size:13px;opacity:0.7;margin-top:8px">
    <strong>Test Categories:</strong> Unit tests (filters, sorting, parsing) + E2E tests (state, CRUD, workflows, validation) + Search/History/Validation + Edge Cases
  </p>
  
  <button onclick="runAllTests()">▶️ Run All Tests</button>
  <button onclick="toggleLog()">📋 Toggle Log</button>
  
  <div id="results"></div>
  <div id="summary" class="summary" style="display:none;"></div>
  <pre id="log"></pre>

  <script>
    // ============================================
    // TEST FRAMEWORK
    // ============================================
    let testResults = [];
    let logMessages = [];
    
    function log(msg) {
      logMessages.push(msg);
      console.log(msg);
    }
    
    function toggleLog() {
      const el = document.getElementById('log');
      el.classList.toggle('visible');
      el.textContent = logMessages.join('\n');
    }
    
    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }
    
    function assertEqual(actual, expected, message) {
      if (actual !== expected) {
        throw new Error(`${message}\n  Expected: ${expected}\n  Actual: ${actual}`);
      }
    }
    
    function assertArrayLength(arr, length, message) {
      if (arr.length !== length) {
        throw new Error(`${message}\n  Expected length: ${length}\n  Actual length: ${arr.length}`);
      }
    }

    // ============================================
    // MOCK DATA
    // ============================================
    const mockCards = [
      {
        id: 1000,
        name: 'Chase Sapphire Reserve',
        bank: 'Chase',
        points: 85000,
        due: '2025-09-15',
        owner: 'Me',
        perks: ['3x Dining', '3x Travel', '1.5x Everything'],
        redeem: [{name: 'United', ratio: '1:1', est: 85000}],
        coupons: [{text: '$300 Travel Credit', expiry: '2025-12-31', done: false}],
        history: []
      },
      {
        id: 2000,
        name: 'Amex Gold',
        bank: 'American Express',
        points: 50000,
        due: '2025-08-01',
        owner: 'Wife',
        perks: ['4x Dining', '4x Groceries', '3x Flights'],
        redeem: [{name: 'Delta', ratio: '1:1', est: 50000}],
        coupons: [],
        history: []
      },
      {
        id: 3000,
        name: 'Capital One Venture X',
        bank: 'Capital One',
        points: 120000,
        due: '2025-10-20',
        owner: 'Me',
        perks: ['2x Everything', '10x Hotels via Portal'],
        redeem: [{name: 'Turkish', ratio: '1:1', est: 120000}],
        coupons: [],
        history: []
      }
    ];

    // ============================================
    // HELPER FUNCTIONS (copied from main.js for testing)
    // ============================================
    // Global cards array for v3.5 tests
    let cards = [];
    
    function extractCategory(perk) {
      const match = perk.match(/^\d+(\.\d+)?x\s+(.+)$/i);
      return match ? match[2] : null;
    }
    
    const CATEGORY_ALIASES = {
      'dining worldwide': 'Dining',
      'restaurants': 'Dining',
      'restaurants worldwide': 'Dining',
      'travel': 'Travel',
      'travel worldwide': 'Travel',
      'flights': 'Travel',
      'groceries': 'Groceries',
      'supermarkets': 'Groceries',
      'us supermarkets': 'Groceries',
      'everything': 'Everything',
      'everything else': 'Everything',
      'hotels': 'Hotels',
      'hotels via portal': 'Hotels',
    };
    
    function normalizeCategory(cat) {
      if (!cat) return null;
      const lower = cat.toLowerCase().trim();
      return CATEGORY_ALIASES[lower] || cat.charAt(0).toUpperCase() + cat.slice(1);
    }
    
    function sortCards(list, sortOrder) {
      const sorted = [...list];
      switch(sortOrder) {
        case 'points':
          return sorted.sort((a, b) => b.points - a.points);
        case 'due':
          return sorted.sort((a, b) => {
            if (!a.due) return 1;
            if (!b.due) return -1;
            return new Date(a.due) - new Date(b.due);
          });
        case 'name':
          return sorted.sort((a, b) => a.name.localeCompare(b.name));
        case 'recent':
        default:
          return sorted.sort((a, b) => b.id - a.id);
      }
    }
    
    function filterByOwner(list, tab) {
      if (tab === 'all') return list;
      return list.filter(c => (c.owner || 'Me') === tab);
    }
    
    function filterByCategory(list, category) {
      if (!category) return list;
      return list.filter(c => {
        return (c.perks || []).some(p => {
          const cat = extractCategory(p);
          const normalized = normalizeCategory(cat);
          return normalized && normalized.toLowerCase() === category.toLowerCase();
        });
      });
    }
    
    function filterByPartner(list, partner) {
      if (!partner) return list;
      return list.filter(c => {
        return (c.redeem || []).some(r => r.name === partner);
      });
    }
    
    function getAllPartners(list) {
      const partners = new Set();
      list.forEach(c => {
        (c.redeem || []).forEach(r => {
          if (r.name) partners.add(r.name);
        });
      });
      return [...partners].sort();
    }

    // ============================================
    // CARD OPEN DATE & 5/24 TRACKING FUNCTIONS
    // ============================================
    function getCardAge(openDate) {
      if (!openDate) return null;
      const opened = new Date(openDate);
      const today = new Date();
      const diffMs = today - opened;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const years = Math.floor(diffDays / 365);
      const months = Math.floor((diffDays % 365) / 30);
      return { years, months };
    }

    function formatCardAge(openDate) {
      const age = getCardAge(openDate);
      if (!age) return 'No date';
      return `${age.years}y ${age.months}m`;
    }

    function getNextAnniversaryDate(openDate) {
      if (!openDate) return null;
      const opened = new Date(openDate);
      const today = new Date();
      const thisYear = today.getFullYear();
      
      // Try this year's anniversary
      let nextAnniv = new Date(thisYear, opened.getMonth(), opened.getDate());
      
      // If it's already passed, use next year
      if (nextAnniv <= today) {
        nextAnniv = new Date(thisYear + 1, opened.getMonth(), opened.getDate());
      }
      
      return nextAnniv;
    }

    function getCardsOpenedInLast24Months(cardList, owner = null) {
      const today = new Date();
      const cutoff = new Date(today);
      cutoff.setMonth(cutoff.getMonth() - 24);
      
      let filtered = cardList;
      if (owner) {
        filtered = cardList.filter(c => c.owner === owner);
      }
      
      return filtered.filter(c => {
        if (!c.openDate) return false;
        const opened = new Date(c.openDate);
        return opened >= cutoff;
      }).length;
    }

    function get524Status(cardList, owner) {
      const today = new Date();
      const cutoff = new Date(today);
      cutoff.setMonth(cutoff.getMonth() - 24);
      
      let filtered = cardList;
      if (owner) {
        filtered = cardList.filter(c => c.owner === owner);
      }
      
      const recentCards = filtered.filter(c => {
        if (!c.openDate) return false;
        const opened = new Date(c.openDate);
        return opened >= cutoff;
      });
      
      const count = recentCards.length;
      return {
        count: count,
        cards: recentCards,
        under524: count < 5
      };
    }

    // ============================================
    // v3.3: BACKUP FRESHNESS TRACKING FUNCTIONS
    // ============================================
    function getLastBackupDate() {
      return localStorage.getItem('cpLastBackup');
    }

    function getDaysSinceBackup() {
      const last = getLastBackupDate();
      if (!last) return null;
      const diff = Date.now() - new Date(last).getTime();
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function shouldShowBackupReminder() {
      const days = getDaysSinceBackup();
      return days === null || days >= 30;
    }

    function formatLastBackup() {
      const last = getLastBackupDate();
      if (!last) return 'Never backed up';
      const days = getDaysSinceBackup();
      if (days === 0) return 'Today';
      if (days === 1) return 'Yesterday';
      return `${days} days ago`;
    }

    // ============================================
    // v3.4: BENEFIT/PERK TRACKING FUNCTIONS
    // ============================================
    function getPeriodLabels(recurrence) {
      switch (recurrence) {
        case 'monthly':
          return ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        case 'quarterly':
          return ['Q1', 'Q2', 'Q3', 'Q4'];
        case 'semi-annual':
          return ['H1', 'H2'];
        case 'annual':
        default:
          return ['Year'];
      }
    }

    function getPeriodKey(recurrence, periodIdx) {
      const year = new Date().getFullYear();
      switch (recurrence) {
        case 'monthly':
          return `${year}-${String(periodIdx + 1).padStart(2, '0')}`;
        case 'quarterly':
          return `${year}-Q${periodIdx + 1}`;
        case 'semi-annual':
          return `${year}-H${periodIdx + 1}`;
        case 'annual':
        default:
          return `${year}`;
      }
    }

    function initializeBenefitPeriods(benefit) {
      // Check if periods exist AND have entries (not just empty object)
      if (benefit.periods && Object.keys(benefit.periods).length > 0) return benefit;
      
      const recurrence = benefit.recurrence || 'annual';
      const periodLabels = getPeriodLabels(recurrence);
      const periods = {};
      
      periodLabels.forEach((_, idx) => {
        const key = getPeriodKey(recurrence, idx);
        periods[key] = { used: false, amount: 0 };
      });
      
      benefit.periods = periods;
      return benefit;
    }

    function getBenefitUsedTotal(benefit) {
      if (!benefit.periods) return 0;
      return Object.values(benefit.periods).reduce((sum, p) => sum + (p.used ? p.amount : 0), 0);
    }

    // ============================================
    // v3.5: BENEFIT NOTIFICATION & AUTO-RESET FUNCTIONS
    // ============================================
    /**
     * Get current period index for a recurrence type
     * monthly: 0-11
     * quarterly: 0-3
     * semi-annual: 0-1
     * annual: 0
     */
    function getCurrentPeriodIndex(recurrence) {
      const now = new Date();
      switch(recurrence) {
        case 'monthly':
          return now.getMonth(); // 0-11
        case 'quarterly':
          return Math.floor(now.getMonth() / 3); // 0-3
        case 'semi-annual':
          return now.getMonth() < 6 ? 0 : 1; // 0-1
        case 'annual':
        default:
          return 0;
      }
    }

    /**
     * Get end date of current period
     */
    function getCurrentPeriodEndDate(recurrence) {
      const now = new Date();
      const year = now.getFullYear();
      switch(recurrence) {
        case 'monthly':
          return new Date(year, now.getMonth() + 1, 0); // Last day of current month
        case 'quarterly':
          const q = Math.floor(now.getMonth() / 3);
          return new Date(year, (q + 1) * 3, 0); // Last day of quarter
        case 'semi-annual':
          return now.getMonth() < 6 ? new Date(year, 5, 30) : new Date(year, 11, 31);
        case 'annual':
        default:
          return new Date(year, 11, 31);
      }
    }

    /**
     * Get benefits expiring within N days
     * Returns array of {card, benefit, benefitIdx, daysUntil, periodKey, value}
     */
    function getExpiringBenefits(daysThreshold = 7) {
      const expiring = [];
      const now = new Date();
      
      cards.forEach(card => {
        (card.coupons || []).forEach((benefit, idx) => {
          if (benefit.recurrence === 'one-time') return;
          
          const endDate = getCurrentPeriodEndDate(benefit.recurrence);
          const daysUntil = Math.ceil((endDate - now) / (1000 * 60 * 60 * 24));
          
          if (daysUntil <= daysThreshold && daysUntil >= 0) {
            // Check if current period is unused
            const periodIdx = getCurrentPeriodIndex(benefit.recurrence);
            const periodKey = getPeriodKey(benefit.recurrence, periodIdx);
            const periodData = (benefit.periods || {})[periodKey];
            
            if (!periodData || !periodData.used) {
              expiring.push({
                card,
                benefit,
                benefitIdx: idx,
                daysUntil,
                periodKey,
                value: benefit.amount || 0
              });
            }
          }
        });
      });
      
      return expiring.sort((a, b) => a.daysUntil - b.daysUntil);
    }

    /**
     * Initialize new period if needed (for year transitions)
     * Returns true if period was created
     */
    function ensureCurrentPeriodExists(benefit) {
      const recurrence = benefit.recurrence || 'annual';
      const periodIdx = getCurrentPeriodIndex(recurrence);
      const periodKey = getPeriodKey(recurrence, periodIdx);
      
      if (!benefit.periods) benefit.periods = {};
      if (!benefit.periods[periodKey]) {
        benefit.periods[periodKey] = { used: false, amount: 0 };
        return true; // Period was created
      }
      return false;
    }

    /**
     * Auto-reset check on load
     * Ensures current period exists and initializes new periods
     */
    function checkAndResetBenefits() {
      let changed = false;
      cards.forEach(card => {
        (card.coupons || []).forEach(benefit => {
          if (ensureCurrentPeriodExists(benefit)) {
            changed = true;
          }
        });
      });
      // Note: We don't saveCards in test environment
    }

    // ============================================
    // NEW SEARCH FUNCTIONALITY
    // ============================================
    function searchCards(list, query) {
      if (!query || query.trim() === '') return list;
      
      const q = query.toLowerCase().trim();
      return list.filter(card => {
        // Search card name
        if (card.name.toLowerCase().includes(q)) return true;
        
        // Search bank name
        if (card.bank.toLowerCase().includes(q)) return true;
        
        // Search perks (categories)
        if ((card.perks || []).some(p => p.toLowerCase().includes(q))) return true;
        
        // Search transfer partners
        if ((card.redeem || []).some(r => r.name.toLowerCase().includes(q))) return true;
        
        // Search coupon text
        if ((card.coupons || []).some(c => c.text.toLowerCase().includes(q))) return true;
        
        return false;
      });
    }

    // ============================================
    // NEW DATA VALIDATION FUNCTIONS
    // ============================================
    function isValidCard(card) {
      // Check required fields
      if (!card || typeof card !== 'object') return false;
      if (!card.id) return false;
      if (!card.name || typeof card.name !== 'string') return false;
      if (!card.bank || typeof card.bank !== 'string') return false;
      if (typeof card.points !== 'number' || card.points < 0 || isNaN(card.points)) return false;
      if (!Array.isArray(card.perks)) return false;
      if (!Array.isArray(card.redeem)) return false;
      if (!Array.isArray(card.coupons)) return false;
      if (!Array.isArray(card.history)) return false;
      
      // Validate perks format
      for (const perk of card.perks) {
        if (typeof perk !== 'string') return false;
      }
      
      // Validate redeem partners
      for (const partner of card.redeem) {
        if (!partner.name || typeof partner.name !== 'string') return false;
        if (!partner.ratio || typeof partner.ratio !== 'string') return false;
        if (typeof partner.est !== 'number' || partner.est < 0) return false;
      }
      
      // Validate coupons
      for (const coupon of card.coupons) {
        if (!coupon.text || typeof coupon.text !== 'string') return false;
        if (!coupon.expiry || typeof coupon.expiry !== 'string') return false;
        if (typeof coupon.done !== 'boolean') return false;
      }
      
      // Validate history
      for (const entry of card.history) {
        if (!entry.type || (entry.type !== 'earned' && entry.type !== 'spent')) return false;
        if (typeof entry.amount !== 'number' || entry.amount < 0) return false;
        if (!entry.date || typeof entry.date !== 'string') return false;
      }
      
      return true;
    }

    function validateCardName(name) {
      if (!name || typeof name !== 'string') return false;
      if (name.trim().length === 0) return false;
      if (name.length > 100) return false;
      return true;
    }

    function hasDuplicateCard(cards, newCard) {
      return cards.some(c => 
        c.id !== newCard.id && 
        c.name.toLowerCase() === newCard.name.toLowerCase() &&
        c.bank.toLowerCase() === newCard.bank.toLowerCase()
      );
    }

    // Hotel partner keywords for emoji detection
    const HOTEL_PARTNERS = [
      'Marriott', 'IHG', 'Hyatt', 'Wyndham', 'Hilton', 'Accor',
      'Choice', 'MGM', 'I Prefer', 'Hotels', 'Hotel', 'Resorts'
    ];

    function getPartnerEmoji(partnerName) {
      if (!partnerName) return '✈️'; // Default to airline
      const name = partnerName.toLowerCase();
      
      // Check if partner name contains hotel keywords
      for (const keyword of HOTEL_PARTNERS) {
        if (name.includes(keyword.toLowerCase())) {
          return '🏨';
        }
      }
      
      // Default to airline emoji
      return '✈️';
    }

    // ============================================
    // TEST SUITES
    // ============================================
    const testSuites = {
      
      // ----------------------------------------
      // Category Filter Tests
      // ----------------------------------------
      'Category Filter': [
        {
          name: 'Filter by Dining returns cards with Dining perks',
          fn: () => {
            const result = filterByCategory(mockCards, 'Dining');
            assertArrayLength(result, 2, 'Should return 2 cards with Dining');
            assert(result.some(c => c.name === 'Chase Sapphire Reserve'), 'Should include CSR');
            assert(result.some(c => c.name === 'Amex Gold'), 'Should include Amex Gold');
          }
        },
        {
          name: 'Filter by Travel returns cards with Travel perks',
          fn: () => {
            const result = filterByCategory(mockCards, 'Travel');
            assertArrayLength(result, 2, 'Should return 2 cards with Travel');
          }
        },
        {
          name: 'Filter by empty string returns ALL cards',
          fn: () => {
            const result = filterByCategory(mockCards, '');
            assertArrayLength(result, 3, 'Empty filter should return all 3 cards');
          }
        },
        {
          name: 'Filter by null returns ALL cards',
          fn: () => {
            const result = filterByCategory(mockCards, null);
            assertArrayLength(result, 3, 'Null filter should return all 3 cards');
          }
        },
        {
          name: 'Filter by non-existent category returns empty',
          fn: () => {
            const result = filterByCategory(mockCards, 'NonExistent');
            assertArrayLength(result, 0, 'Should return 0 cards');
          }
        },
        {
          name: 'Filter is case-insensitive',
          fn: () => {
            const result1 = filterByCategory(mockCards, 'dining');
            const result2 = filterByCategory(mockCards, 'DINING');
            assertEqual(result1.length, result2.length, 'Case should not matter');
          }
        }
      ],
      
      // ----------------------------------------
      // Sorting Tests
      // ----------------------------------------
      'Card Sorting': [
        {
          name: 'Sort by points (high to low)',
          fn: () => {
            const result = sortCards(mockCards, 'points');
            assertEqual(result[0].name, 'Capital One Venture X', 'Highest points first');
            assertEqual(result[2].name, 'Amex Gold', 'Lowest points last');
          }
        },
        {
          name: 'Sort by name (A-Z)',
          fn: () => {
            const result = sortCards(mockCards, 'name');
            assertEqual(result[0].name, 'Amex Gold', 'A comes first');
            assertEqual(result[2].name, 'Chase Sapphire Reserve', 'Ch comes after Ca');
          }
        },
        {
          name: 'Sort by due date (soonest first)',
          fn: () => {
            const result = sortCards(mockCards, 'due');
            assertEqual(result[0].name, 'Amex Gold', 'Aug 1 is soonest');
            assertEqual(result[2].name, 'Capital One Venture X', 'Oct 20 is latest');
          }
        },
        {
          name: 'Sort by recent (newest ID first)',
          fn: () => {
            const result = sortCards(mockCards, 'recent');
            assertEqual(result[0].id, 3000, 'Highest ID first');
            assertEqual(result[2].id, 1000, 'Lowest ID last');
          }
        },
        {
          name: 'Default sort is recent',
          fn: () => {
            const result = sortCards(mockCards, undefined);
            assertEqual(result[0].id, 3000, 'Default should sort by recent');
          }
        }
      ],
      
      // ----------------------------------------
      // Owner Filter Tests
      // ----------------------------------------
      'Owner Filter': [
        {
          name: 'Filter by "Me" returns only my cards',
          fn: () => {
            const result = filterByOwner(mockCards, 'Me');
            assertArrayLength(result, 2, 'Should return 2 cards owned by Me');
            assert(result.every(c => c.owner === 'Me'), 'All should be owned by Me');
          }
        },
        {
          name: 'Filter by "Wife" returns only wife cards',
          fn: () => {
            const result = filterByOwner(mockCards, 'Wife');
            assertArrayLength(result, 1, 'Should return 1 card owned by Wife');
            assertEqual(result[0].name, 'Amex Gold', 'Should be Amex Gold');
          }
        },
        {
          name: 'Filter by "all" returns ALL cards',
          fn: () => {
            const result = filterByOwner(mockCards, 'all');
            assertArrayLength(result, 3, 'Should return all 3 cards');
          }
        }
      ],
      
      // ----------------------------------------
      // Category Extraction Tests
      // ----------------------------------------
      'Category Extraction': [
        {
          name: 'Extract category from "3x Dining"',
          fn: () => {
            assertEqual(extractCategory('3x Dining'), 'Dining', 'Should extract Dining');
          }
        },
        {
          name: 'Extract category from "1.5x Everything"',
          fn: () => {
            assertEqual(extractCategory('1.5x Everything'), 'Everything', 'Should extract Everything');
          }
        },
        {
          name: 'Extract category from "10x Hotels via Portal"',
          fn: () => {
            assertEqual(extractCategory('10x Hotels via Portal'), 'Hotels via Portal', 'Should extract full phrase');
          }
        },
        {

      'Point History': [
        {
          name: 'Add earned points updates balance',
          fn: () => {
            let card = JSON.parse(JSON.stringify(mockCards[0])); // Deep copy
            const initialPoints = card.points;
            const earnedAmount = 5000;
            
            card.points += earnedAmount;
            card.history.push({
              type: 'earned',
              amount: earnedAmount,
              date: new Date().toISOString().split('T')[0],
              note: 'Sign-up bonus'
            });
            
            assertEqual(card.points, initialPoints + earnedAmount, 'Points should increase');
            assertArrayLength(card.history, 1, 'History should have 1 entry');
            assertEqual(card.history[0].type, 'earned', 'Entry type should be earned');
          }
        },
        {
          name: 'Add spent points updates balance',
          fn: () => {
            let card = JSON.parse(JSON.stringify(mockCards[0]));
            const initialPoints = card.points;
            const spentAmount = 10000;
            
            card.points -= spentAmount;
            card.history.push({
              type: 'spent',
              amount: spentAmount,
              date: new Date().toISOString().split('T')[0],
              note: 'Redeemed for flight'
            });
            
            assertEqual(card.points, initialPoints - spentAmount, 'Points should decrease');
            assertArrayLength(card.history, 1, 'History should have 1 entry');
            assertEqual(card.history[0].type, 'spent', 'Entry type should be spent');
          }
        },
        {
          name: 'History entries have correct timestamps',
          fn: () => {
            const card = {points: 0, history: []};
            const today = new Date().toISOString().split('T')[0];
            
            card.history.push({type: 'earned', amount: 1000, date: today, note: 'Test'});
            
            assert(card.history[0].date, 'Date should exist');
            assert(card.history[0].date.includes('202'), 'Date should be valid');
          }
        },
        {
          name: 'History preserves order (newest first)',
          fn: () => {
            const card = {points: 0, history: []};
            
            // Add 3 entries
            card.history.push({type: 'earned', amount: 1000, date: '2025-01-01', note: 'First'});
            card.history.push({type: 'earned', amount: 2000, date: '2025-01-02', note: 'Second'});
            card.history.push({type: 'earned', amount: 3000, date: '2025-01-03', note: 'Third'});
            
            assertArrayLength(card.history, 3, 'Should have 3 entries');
            
            // Sort newest first
            const sorted = card.history.sort((a, b) => new Date(b.date) - new Date(a.date));
            assertEqual(sorted[0].note, 'Third', 'Newest should be first');
            assertEqual(sorted[2].note, 'First', 'Oldest should be last');
          }
        },
        {
          name: 'Edit card preserves history',
          fn: () => {
            let card = JSON.parse(JSON.stringify(mockCards[0]));
            
            // Add history
            card.history.push({type: 'earned', amount: 5000, date: '2025-01-01', note: 'Bonus'});
            const historyLength = card.history.length;
            
            // Edit card properties
            card.name = 'Updated Name';
            card.points = 99999;
            
            // History should be preserved
            assertArrayLength(card.history, historyLength, 'History should be preserved');
            assertEqual(card.history[0].amount, 5000, 'History content should be intact');
          }
        },
        {
          name: 'Multiple transactions are recorded',
          fn: () => {
            const card = {points: 0, history: []};
            
            // Earn 1000
            card.points += 1000;
            card.history.push({type: 'earned', amount: 1000, date: '2025-01-01', note: 'Bonus'});
            
            // Earn 500
            card.points += 500;
            card.history.push({type: 'earned', amount: 500, date: '2025-01-02', note: 'Spend'});
            
            // Spend 300
            card.points -= 300;
            card.history.push({type: 'spent', amount: 300, date: '2025-01-03', note: 'Transfer'});
            
            assertEqual(card.points, 1200, 'Points should be correct (1000+500-300)');
            assertArrayLength(card.history, 3, 'Should have 3 history entries');
          }
        }

              periods: {}
            };
            const initialized = initializeBenefitPeriods(benefit);
            
            // Check each period has correct structure
            for (const [key, period] of Object.entries(initialized.periods)) {
              assert(key.includes('Q'), `Key should contain Q for quarterly: ${key}`);
              assert(period.hasOwnProperty('used'), 'Should have used field');
              assert(period.hasOwnProperty('amount'), 'Should have amount field');
              assertEqual(typeof period.used, 'boolean', 'used should be boolean');
              assertEqual(typeof period.amount, 'number', 'amount should be number');
              assertEqual(period.used, false, 'Should initialize as unused');
              assertEqual(period.amount, 0, 'Should initialize amount as 0');
            }
          }
        },
        {
          name: 'Period toggles preserve amount values across all periods',
          fn: () => {
            const year = new Date().getFullYear();
            const benefit = {
              text: 'Test',
              amount: 25,
              recurrence: 'quarterly',
              periods: {
                [`${year}-Q1`]: { used: false, amount: 25 },
                [`${year}-Q2`]: { used: false, amount: 25 },
                [`${year}-Q3`]: { used: false, amount: 25 },
                [`${year}-Q4`]: { used: false, amount: 25 }
              }
            };
            
            // Toggle Q1 and Q3
            benefit.periods[`${year}-Q1`].used = true;
            benefit.periods[`${year}-Q3`].used = true;
            
            // Verify amount values preserved
            assertEqual(benefit.periods[`${year}-Q1`].amount, 25, 'Q1 amount preserved');
            assertEqual(benefit.periods[`${year}-Q2`].amount, 25, 'Q2 amount preserved');
            assertEqual(benefit.periods[`${year}-Q3`].amount, 25, 'Q3 amount preserved');
            assertEqual(benefit.periods[`${year}-Q4`].amount, 25, 'Q4 amount preserved');
            
            // Verify total
            const total = getBenefitUsedTotal(benefit);
            assertEqual(total, 50, 'Used total should be 50 (25+25)');
          }
        },
        {
          name: 'Semi-annual benefit calculation - H1 and H2 independent',
          fn: () => {
            const year = new Date().getFullYear();
            const benefit = {
              text: 'Semi-Annual Credit',
              amount: 150,
              yearlyTotal: 300,
              recurrence: 'semi-annual',
              periods: {
                [`${year}-H1`]: { used: false, amount: 150 },
                [`${year}-H2`]: { used: false, amount: 150 }
              }
            };
            
            // Toggle H1
            benefit.periods[`${year}-H1`].used = true;
            let total = getBenefitUsedTotal(benefit);
            assertEqual(total, 150, 'H1 alone should be 150');
            
            // Toggle H2
            benefit.periods[`${year}-H2`].used = true;
            total = getBenefitUsedTotal(benefit);
            assertEqual(total, 300, 'Both H1 and H2 should total 300');
            
            // Toggle H1 back off
            benefit.periods[`${year}-H1`].used = false;
            total = getBenefitUsedTotal(benefit);
            assertEqual(total, 150, 'H2 alone should be 150');
          }
        },
        {
          name: 'Period data validates period structure compliance',
          fn: () => {
            const year = new Date().getFullYear();
            const periods = {
              [`${year}-01`]: { used: true, amount: 10 },
              [`${year}-02`]: { used: false, amount: 0 },
              [`${year}-03`]: { used: true, amount: 20 }
            };
            
            // Validate each period
            for (const [key, period] of Object.entries(periods)) {
              assert(period.hasOwnProperty('used'), `Period ${key} missing 'used'`);
              assert(period.hasOwnProperty('amount'), `Period ${key} missing 'amount'`);
              assert(typeof period.used === 'boolean', `Period ${key} 'used' not boolean`);
              assert(typeof period.amount === 'number', `Period ${key} 'amount' not number`);
              assert(period.amount >= 0, `Period ${key} 'amount' should be non-negative`);
            }
          }
        }
      ]
    };

    // ============================================
    // TEST RUNNER
    // ============================================
    function runAllTests() {
      testResults = [];
      logMessages = [];
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';
      
      let passed = 0;
      let failed = 0;
      
      for (const [suiteName, tests] of Object.entries(testSuites)) {
        log(`\n📦 Suite: ${suiteName}`);
        
        const suiteDiv = document.createElement('div');
        suiteDiv.className = 'test-suite';
        suiteDiv.innerHTML = `<h2>${suiteName}</h2>`;
        
        for (const test of tests) {
          let status = 'pass';
          let errorMsg = '';
          
          try {
            test.fn();
            passed++;
            log(`  ✅ ${test.name}`);
          } catch (e) {
            status = 'fail';
            errorMsg = e.message;
            failed++;
            log(`  ❌ ${test.name}`);
            log(`     ${e.message}`);
          }
          
          const testDiv = document.createElement('div');
          testDiv.className = `test ${status}`;
          testDiv.innerHTML = `${status === 'pass' ? '✅' : '❌'} ${test.name}`;
          if (errorMsg) {
            testDiv.title = errorMsg;
          }
          suiteDiv.appendChild(testDiv);
          
          testResults.push({ suite: suiteName, name: test.name, status, error: errorMsg });
        }
        
        resultsDiv.appendChild(suiteDiv);
      }
      
      // Summary
      const summaryDiv = document.getElementById('summary');
      summaryDiv.style.display = 'block';
      summaryDiv.className = `summary ${failed === 0 ? 'all-pass' : 'has-fail'}`;
      summaryDiv.innerHTML = `${failed === 0 ? '🎉' : '⚠️'} ${passed} passed, ${failed} failed`;
      
      log(`\n${'='.repeat(40)}`);
      log(`TOTAL: ${passed} passed, ${failed} failed`);
    }
    
    // Auto-run on load
    window.onload = runAllTests;
  </script>
